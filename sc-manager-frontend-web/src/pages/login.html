<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion — Sport Club Manager</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>body { font-family: 'Poppins', sans-serif; }</style>
    <!-- Google reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  </head>
  <body class="min-h-screen flex items-center justify-center bg-gray-50">

    <div class="bg-white rounded-2xl shadow-lg w-full max-w-md p-8 mx-4">

      <!-- Logo et titre -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full mb-4" style="background-color: #003333">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a10 10 0 0 1 0 20M12 2a10 10 0 0 0 0 20M2 12h20M12 2c-2.5 3-4 6.5-4 10s1.5 7 4 10M12 2c2.5 3 4 6.5 4 10s-1.5 7-4 10"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold" style="color: #003333">Sport Club Manager</h1>
        <p class="text-gray-500 text-sm mt-1">Connectez-vous à votre espace</p>
      </div>

      <!-- Message d'erreur -->
      <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm"></div>

      <!-- Formulaire -->
      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" placeholder="exemple@email.com"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2"
            required />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2"
            required />
        </div>

        <!-- Google reCAPTCHA v2 -->
        <!-- Remplace TON_SITE_KEY par ta clé sur https://www.google.com/recaptcha -->
        <!-- <div class="g-recaptcha" data-sitekey="TON_SITE_KEY"></div> -->

        <button type="submit" id="submit-btn"
          class="w-full py-3 rounded-lg text-white font-semibold text-sm transition-opacity hover:opacity-90"
          style="background-color: #008080">
          Se connecter
        </button>
      </form>

      <!-- Lien retour -->
      <p class="text-center text-sm text-gray-400 mt-6">
        <a href="/" class="hover:underline" style="color: #008080">← Retour à l'accueil</a>
      </p>

    </div>

    <script type="module">
      const API_URL = 'http://localhost:3333/api/v1'
      const form = document.getElementById('login-form')
      const errorMsg = document.getElementById('error-msg')
      const submitBtn = document.getElementById('submit-btn')

      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        const email = document.getElementById('email').value
        const password = document.getElementById('password').value

        // Vérifier que le captcha est complété
        // const captchaResponse = grecaptcha.getResponse()
        // if (!captchaResponse) {
        //   errorMsg.textContent = 'Veuillez valider le captcha.'
        //   errorMsg.classList.remove('hidden')
        //   return
        // }

        submitBtn.textContent = 'Connexion...'
        submitBtn.disabled = true
        errorMsg.classList.add('hidden')

        try {
          const response = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          })

          const data = await response.json()

          if (response.ok) {
            localStorage.setItem('token', data.token)
            localStorage.setItem('user', JSON.stringify(data.user))
            localStorage.setItem('roles', JSON.stringify(data.user.roles))
            window.location.href = '/src/pages/dashboard.html'
          } else {
            errorMsg.textContent = data.error || 'Email ou mot de passe incorrect'
            errorMsg.classList.remove('hidden')
            // Réinitialiser le captcha si erreur
            // grecaptcha.reset()
          }
        } catch (err) {
          errorMsg.textContent = 'Impossible de contacter le serveur.'
          errorMsg.classList.remove('hidden')
        //   grecaptcha.reset()
        }

        submitBtn.textContent = 'Se connecter'
        submitBtn.disabled = false
      })
    </script>

  </body>
</html>
